<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calendrier</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Calendrier">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-default: #F2F2F7;
            --text-default: #000000;
            --grid-default: #E5E5EA;
            --weekend-bg: #FFE5E5;
            --holiday-bg: #E5FFE5;
            --primary-color: #007AFF;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: var(--text-default);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRE DE NAVIGATION */
        .header-bar {
            background-color: var(--bg-default);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid var(--grid-default);
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            background: rgba(0,0,0,0.06);
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: inherit;
        }

        .btn-circle {
            padding: 10px;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-success {
            background-color: #34C759;
            color: white;
        }

        .month-title {
            font-size: 22px;
            font-weight: bold;
            min-width: 165px;
            text-align: center;
        }

        /* CALENDRIER */
        .calendar-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px 20px;
            overflow: hidden;
        }

        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .days-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: 1fr;
            gap: 12px;
        }

        .day-cell {
            background-color: var(--bg-default);
            border: 2px solid var(--grid-default);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
        }

        .day-cell:hover {
            transform: scale(1.01);
        }

        .day-number {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .day-today .day-number {
            color: #007AFF;
        }

        .empty-cell {
            visibility: hidden;
        }

        /* BADGES RDV DANS LES CASES */
        .rdv-dots-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .rdv-badge {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            font-size: 16px;
        }

        /* LISTE DÉROULANTE TOUS LES RDV */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 320px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.15);
            border-radius: 10px;
            z-index: 10;
            max-height: 350px;
            overflow-y: auto;
            right: 0;
            border: 1px solid #e5e5e5;
        }

        .dropdown-content button {
            width: 100%;
            padding: 12px 16px;
            text-align: left;
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 1px solid #f2f2f7;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #000000;
        }

        .dropdown-content button:hover {
            background-color: #f2f2f7;
        }

        /* FENÊTRES MODALES (RDV & RÉGLAGES) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 166px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            color: #000000;
        }

        .settings-layout {
            display: flex;
            gap: 20px;
        }
        
        .settings-col {
            flex: 1;
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input, .form-group textarea, .form-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }

        .time-select-container {
            display: flex;
            gap: 10px;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 24px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .modal-actions-right {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .btn-danger {
            background-color: #FF3B30;
            color: white;
        }

        /* SÉLECTEURS GRAPHIQUES (COULEURS ET ICÔNES) */
        .picker-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            background: #f8f8fa;
            padding: 12px;
            border-radius: 10px;
        }

        .color-dot-opt {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            box-sizing: border-box;
        }

        .color-dot-opt.selected {
            border-color: #007AFF;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background: #f8f8fa;
            padding: 12px;
            border-radius: 10px;
        }

        .icon-opt {
            height: 44px;
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .icon-opt.selected {
            background-color: rgba(0, 122, 255, 0.15);
            border: 2px solid #007AFF;
            color: #007AFF;
        }

        .category-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .category-list-item input {
            flex: 1;
            padding: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header-bar" id="mainHeader">
        <div class="header-left">
            <button class="btn btn-circle" onclick="openSettings()"><i class="fa-solid fa-gear"></i></button>
            <select id="yearSelect" class="btn" onchange="changeYear(this.value)"></select>
        </div>
        
        <div class="header-middle" style="display: flex; align-items: center; gap: 15px;">
            <button class="btn" onclick="navigateMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <span class="month-title" id="monthTitle">Mois</span>
            <button class="btn" onclick="navigateMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="header-right">
            <div class="dropdown">
                <button class="btn" onclick="toggleDropdown()"><i class="fa-solid fa-list"></i> Tous les RDV (<span id="rdvCount">0</span>)</button>
                <div class="dropdown-content" id="allRdvDropdown"></div>
            </div>
            <button class="btn btn-primary" id="btnToday" onclick="goToToday()">Aujourd'hui</button>
        </div>
    </div>

    <div class="calendar-container">
        <div class="weekdays-grid" id="weekdaysHeader">
            <div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="modal" id="rdvModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0;">Nouveau RDV</h2>
            <input type="hidden" id="rdvId">
            <input type="hidden" id="rdvDateStr">

            <div class="form-group">
                <label>Titre ou description</label>
                <input type="text" id="rdvTitleInput" required placeholder="Ex: Dentiste, Ophtalmo, Coiffeur...">
            </div>

            <div class="form-group">
                <label>Heure du RDV</label>
                <div class="time-select-container">
                    <select id="rdvHour"></select>
                    <select id="rdvMinute"></select>
                </div>
            </div>

            <div class="form-group">
                <label>Lieu ou Lien vidéo</label>
                <input type="text" id="rdvLocation" placeholder="Adresse, Cabinet, Visio...">
            </div>

            <div class="form-group">
                <label>Notes complémentaires</label>
                <textarea id="rdvNotes" rows="2"></textarea>
            </div>

            <div class="form-group">
                <label>Choisir une icône illustrative</label>
                <div class="icon-grid" id="iconPickerContainer"></div>
            </div>

            <div class="form-group">
                <label>Choisir une catégorie</label>
                <div id="rdvCategorySelectorContainer" style="display:flex; flex-direction:column; gap:6px;"></div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-danger" id="btnDeleteRdv" onclick="deleteRdv()">Supprimer</button>
                <div class="modal-actions-right">
                    <button class="btn" onclick="closeModal('rdvModal')">Annuler</button>
                    <button class="btn btn-primary" onclick="saveRdv()">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content" style="width: 850px;">
            <h2 style="margin-top:0; border-bottom: 1px solid #ccc; padding-bottom:10px;">Réglages Généraux</h2>
            
            <div class="settings-layout">
                <div class="settings-col">
                    <h3>Noms des catégories</h3>
                    <div id="settingsCategoriesContainer"></div>
                    
                    <h3 style="margin-top:20px;">Ajouter une catégorie</h3>
                    <div class="form-group">
                        <input type="text" id="newCatName" placeholder="Nom (ex: Privé, Médical...)">
                    </div>
                    <div class="form-group">
                        <label>Couleur associée</label>
                        <div class="picker-container" id="newCatColorPicker"></div>
                    </div>
                    <button class="btn btn-primary" onclick="addNewCategory()" style="width:100%;">Ajouter la catégorie</button>
                </div>
                
                <div style="width:1px; background:#ccc; margin: 0 10px;"></div>

                <div class="settings-col">
                    <h3>Sauvegarde & kDrive</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <button class="btn btn-success" onclick="exportBackup()" style="flex: 1;"><i class="fa-solid fa-cloud-arrow-up"></i> Sauvegarder (kDrive)</button>
                        <button class="btn" onclick="triggerImport()" style="flex: 1;"><i class="fa-solid fa-cloud-arrow-down"></i> Importer</button>
                        <input type="file" id="importFileEl" accept=".json" style="display: none;" onchange="importBackup(this)">
                    </div>

                    <h3>Couleurs de l'interface</h3>
                    <div class="form-group">
                        <label>Couleur du texte général</label>
                        <input type="color" id="setHexText" onchange="saveInterfaceSettings()">
                    </div>
                    <div class="form-group">
                        <label>Bordures de la grille</label>
                        <input type="color" id="setHexGrid" onchange="saveInterfaceSettings()">
                    </div>
                    
                    <h3>Couleurs des cases</h3>
                    <div class="form-group">
                        <label>Fond par défaut</label>
                        <input type="color" id="setHexBg" onchange="saveInterfaceSettings()">
                    </div>
                    <div class="form-group">
                        <label>Fond des Week-ends</label>
                        <input type="color" id="setHexWeekend" onchange="saveInterfaceSettings()">
                    </div>
                    <div class="form-group">
                        <label>Fond des Jours Fériés</label>
                        <input type="color" id="setHexHoliday" onchange="saveInterfaceSettings()">
                    </div>
                    
                    <button class="btn btn-danger" onclick="clearAllData()" style="width:100%; margin-top:15px;"><i class="fa-solid fa-trash"></i> Réinitialiser toute l'App</button>
                </div>
            </div>

            <div class="modal-actions">
                <div class="modal-actions-right">
                    <button class="btn btn-primary" onclick="closeModal('settingsModal')">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let appointments = JSON.parse(localStorage.getItem('web_appointments')) || [];
        
        // PARAMÈTRES INTERFACE PAR DÉFAUT
        let uiSettings = JSON.parse(localStorage.getItem('web_ui_settings')) || {
            textHex: "#000000",
            gridHex: "#E5E5EA",
            bgHex: "#F2F2F7",
            weekendBgHex: "#FFE5E5",
            holidayBgHex: "#E5FFE5"
        };

        // BASE DE COULEURS ET CATÉGORIES PAR DÉFAUT
        let customCategories = JSON.parse(localStorage.getItem('web_custom_categories')) || [
            { id: "1", name: "Travail", hex: "#007AFF" },
            { id: "2", name: "Perso", hex: "#34C759" },
            { id: "3", name: "Urgent", hex: "#FF3B30" },
            { id: "4", name: "Important", hex: "#000000" },
            { id: "5", name: "Blanc", hex: "#FFFFFF" }
        ];

        let currentSelectedColor = "#FF3B30";
        let currentSelectedIcon = "fa-calendar-days";
        let newCatSelectedHex = "#007AFF";

        // PALETTE STANDARD DES MODALES
        const colorPalette = [
            "#000000", "#3A3A3C", "#8E8E93", "#AEAEB2", "#E5E5EA", "#FFFFFF",
            "#007AFF", "#34C759", "#FF3B30", "#AF52DE", "#FF9500", "#FFCC00",
            "#4A2C11", "#A0522D", "#D2B48C", "#FFE5E5", "#E5FFE5", "#E5F5FF"
        ];

        // BIBLIOTHÈQUE ENRICHIE D'ICÔNES
        const iconLibrary = [
            { class: "fa-calendar-days", name: "Calendrier / RDV" },
            { class: "fa-stethoscope", name: "Médecin / Généraliste" },
            { class: "fa-tooth", name: "Dentiste" },
            { class: "fa-pills", name: "Pharmacie / Traitement" },
            { class: "fa-glasses", name: "Lunettes / Ophtalmo / Opticien" },
            { class: "fa-scissors", name: "Coiffeur / Esthétique" },
            { class: "fa-briefcase", name: "Travail / Réunion" },
            { class: "fa-house", name: "Maison / Famille" },
            { class: "fa-wrench", name: "Artisan / Réparation" },
            { class: "fa-phone", name: "Appel / Téléphone" },
            { class: "fa-envelope", name: "Courrier / Administratif" },
            { class: "fa-cart-shopping", name: "Shopping / Courses" },
            { class: "fa-car", name: "Voiture / Garage" },
            { class: "fa-train", name: "Train / Voyage" },
            { class: "fa-plane", name: "Avion / Vacances" },
            { class: "fa-utensils", name: "Restaurant / Repas" },
            { class: "fa-paw", name: "Vétérinaire / Animaux" },
            { class: "fa-dumbbell", name: "Sport / Bien-être" },
            { class: "fa-gift", name: "Anniversaire / Cadeau" },
            { class: "fa-bank", name: "Banque / Factures" }
        ];

        // INITIALISATION DES COMPOSANTS
        function init() {
            setupYearSelect();
            setupTimeSelects();
            applyUiSettings();
            buildIconPicker();
            renderCalendar();
        }

        function setupYearSelect() {
            const select = document.getElementById('yearSelect');
            const currentYear = new Date().getFullYear();
            select.innerHTML = '';
            for(let i = currentYear - 10; i <= currentYear + 20; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.innerText = i;
                if(i === currentYear) opt.selected = true;
                select.appendChild(opt);
            }
        }

        function setupTimeSelects() {
            const hSelect = document.getElementById('rdvHour');
            const mSelect = document.getElementById('rdvMinute');
            hSelect.innerHTML = ''; mSelect.innerHTML = '';
            for(let i=0; i<24; i++) {
                hSelect.innerHTML += `<option value="${i}">${String(i).padStart(2, '0')}h</option>`;
            }
            [0,5,10,15,20,25,30,35,40,45,50,55].forEach(m => {
                mSelect.innerHTML += `<option value="${m}">${String(m).padStart(2, '0')}</option>`;
            });
        }

        function applyUiSettings() {
            document.documentElement.style.setProperty('--bg-default', uiSettings.bgHex);
            document.documentElement.style.setProperty('--text-default', uiSettings.textHex);
            document.documentElement.style.setProperty('--grid-default', uiSettings.gridHex);
            document.documentElement.style.setProperty('--weekend-bg', uiSettings.weekendBgHex);
            document.documentElement.style.setProperty('--holiday-bg', uiSettings.holidayBgHex);

            document.getElementById('setHexText').value = uiSettings.textHex;
            document.getElementById('setHexGrid').value = uiSettings.gridHex;
            document.getElementById('setHexBg').value = uiSettings.bgHex;
            document.getElementById('setHexWeekend').value = uiSettings.weekendBgHex;
            document.getElementById('setHexHoliday').value = uiSettings.holidayBgHex;
            
            let colorForegroundColor = getAccessibleTextColor(uiSettings.bgHex);
            document.getElementById('mainHeader').style.color = colorForegroundColor;
            document.getElementById('weekdaysHeader').style.color = uiSettings.textHex;
        }

        function buildIconPicker() {
            const container = document.getElementById('iconPickerContainer');
            container.innerHTML = '';
            iconLibrary.forEach(ico => {
                let div = document.createElement('div');
                div.className = 'icon-opt';
                div.id = `ico-${ico.class}`;
                div.innerHTML = `<i class="fa-solid ${ico.class}"></i>`;
                div.title = ico.name;
                div.onclick = () => {
                    document.querySelectorAll('.icon-opt').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    currentSelectedIcon = ico.class;
                };
                container.appendChild(div);
            });
        }

        // FONCTIONNALITÉS DE SAUVEGARDE ET IMPORTATION (kDrive / Local) - CORRIGÉ POUR IPAD
                function exportBackup() {
            const dataToExport = {
                appointments: appointments,
                uiSettings: uiSettings,
                customCategories: customCategories
            };
            
            const jsonString = JSON.stringify(dataToExport, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const blobUrl = URL.createObjectURL(blob);
            
            const downloadAnchor = document.createElement('a');
            
            // Nom fixe sans la date pour déclencher l'option "Remplacer" du système
            downloadAnchor.setAttribute("href", blobUrl);
            downloadAnchor.setAttribute("download", "sauvegarde_calendrier.json");
            
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            
            document.body.removeChild(downloadAnchor);
            URL.revokeObjectURL(blobUrl);
        }

        function triggerImport() {
            document.getElementById('importFileEl').click();
        }

        function importBackup(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData.appointments) {
                        appointments = importedData.appointments;
                        localStorage.setItem('web_appointments', JSON.stringify(appointments));
                    }
                    if (importedData.uiSettings) {
                        uiSettings = importedData.uiSettings;
                        localStorage.setItem('web_ui_settings', JSON.stringify(uiSettings));
                    }
                    if (importedData.customCategories) {
                        customCategories = importedData.customCategories;
                        localStorage.setItem('web_custom_categories', JSON.stringify(customCategories));
                    }
                    
                    alert("Sauvegarde importée avec succès ! L'application va se rafraîchir.");
                    location.reload();
                } catch (err) {
                    alert("Erreur : Le fichier de sauvegarde est corrompu ou invalide.");
                }
            };
            reader.readAsText(file);
        }

        // CALCULS DES JOURS FÉRIÉS
        function isHoliday(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();

            if ((month == 1 && day == 1) || (month == 5 && day == 1) || (month == 5 && day == 8) ||
               (month == 7 && day == 14) || (month == 8 && day == 15) || (month == 11 && day == 1) ||
               (month == 11 && day == 11) || (month == 12 && day == 25)) {
                return true;
            }

            let a = year % 19, b = Math.floor(year / 100), c = year % 100;
            let d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
            let g = Math.floor((b - f + 1) / 3);
            let h = (19 * a + b - d - g + 15) % 30;
            let i = Math.floor(c / 4), k = c % 4;
            let l = (32 + 2 * e + 2 * i - h - k) % 7;
            let m = Math.floor((a + 11 * h + 22 * l) / 451);
            let easterMonth = Math.floor((h + l - 7 * m + 114) / 31);
            let easterDay = ((h + l - 7 * m + 114) % 31) + 1;

            let easterDate = new Date(year, easterMonth - 1, easterDay);
            
            let easterMonday = new Date(easterDate); easterMonday.setDate(easterMonday.getDate() + 1);
            let ascension = new Date(easterDate); ascension.setDate(ascension.getDate() + 39);
            let pentecostMonday = new Date(easterDate); pentecostMonday.setDate(pentecostMonday.getDate() + 50);

            return isSameDay(date, easterMonday) || isSameDay(date, ascension) || isSameDay(date, pentecostMonday);
        }

        function isSameDay(d1, d2) {
            return d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
        }

        // DESSIN DU CALENDRIER
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('yearSelect').value = year;
            document.getElementById('monthTitle').innerText = currentDate.toLocaleDateString('fr-FR', { month: 'long' }).toUpperCase() + ' ' + year;
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const gridOffset = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            for(let i = 0; i < gridOffset; i++) {
                grid.innerHTML += `<div class="day-cell empty-cell"></div>`;
            }

            const today = new Date();
            for(let day = 1; day <= daysInMonth; day++) {
                const targetDate = new Date(year, month, day);
                let classes = ['day-cell'];
                let inlineStyle = `border-color: var(--grid-default); color: var(--text-default);`;
                
                if(targetDate.getDay() === 0 || targetDate.getDay() === 6) {
                    inlineStyle += `background-color: var(--weekend-bg);`;
                } else if(isHoliday(targetDate)) {
                    inlineStyle += `background-color: var(--holiday-bg);`;
                } else {
                    inlineStyle += `background-color: var(--bg-default);`;
                }

                if(isSameDay(targetDate, today)) {
                    classes.push('day-today');
                }

                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayRdvs = appointments.filter(r => r.dateStr === dateKey).sort((a,b) => a.hour - b.hour);

                let rdvHTML = '';
                if(dayRdvs.length > 0) {
                    rdvHTML = `<div class="rdv-dots-container">`;
                    dayRdvs.forEach(rdv => {
                        let textBadgeColor = getAccessibleTextColor(rdv.color);
                        let borderStyle = rdv.color.toUpperCase() === '#FFFFFF' ? 'border: 2px solid #000;' : '';
                        rdvHTML += `
                            <div class="rdv-badge" style="background-color: ${rdv.color}; color: ${textBadgeColor}; ${borderStyle}" onclick="event.stopPropagation(); editRdv('${rdv.id}')" title="${String(rdv.hour).padStart(2, '0')}h${String(rdv.minute).padStart(2, '0')} : ${rdv.title}">
                                <i class="fa-solid ${rdv.icon || 'fa-calendar-days'}"></i>
                            </div>`;
                    });
                    rdvHTML += `</div>`;
                }

                grid.innerHTML += `
                    <div class="${classes.join(' ')}" style="${inlineStyle}" onclick="openNewRdv('${dateKey}')">
                        <div class="day-number">${day}</div>
                        ${rdvHTML}
                    </div>
                `;
            }

            document.getElementById('rdvCount').innerText = appointments.length;
            document.getElementById('btnToday').style.opacity = (year === today.getFullYear() && month === today.getMonth()) ? '0.5' : '1';
        }

        function navigateMonth(val) { currentDate.setMonth(currentDate.getMonth() + val); renderCalendar(); }
        function changeYear(year) { currentDate.setFullYear(parseInt(year)); renderCalendar(); }
        function goToToday() { currentDate = new Date(); renderCalendar(); }

        // EXÉCUTION DU FORMULAIRE RDV
        function openNewRdv(dateKey) {
            document.getElementById('modalTitle').innerText = "Nouveau RDV";
            document.getElementById('rdvId').value = '';
            document.getElementById('rdvDateStr').value = dateKey;
            document.getElementById('rdvTitleInput').value = '';
            document.getElementById('rdvHour').value = '9';
            document.getElementById('rdvMinute').value = '0';
            document.getElementById('rdvLocation').value = '';
            document.getElementById('rdvNotes').value = '';
            
            currentSelectedIcon = "fa-calendar-days";
            document.querySelectorAll('.icon-opt').forEach(el => el.classList.remove('selected'));
            let defIco = document.getElementById('ico-fa-calendar-days');
            if(defIco) defIco.classList.add('selected');
            
            if(customCategories.length > 0) currentSelectedColor = customCategories[0].hex;
            buildRdvCategorySelector();

            document.getElementById('btnDeleteRdv').style.display = 'none';
            document.getElementById('rdvModal').style.display = 'flex';
        }

        function buildRdvCategorySelector() {
            const container = document.getElementById('rdvCategorySelectorContainer');
            container.innerHTML = '';
            customCategories.forEach(cat => {
                let row = document.createElement('div');
                row.style = "display:flex; align-items:center; justify-content:space-between; padding:8px; background:#fff; border:1px solid #e5e5e5; border-radius:8px; cursor:pointer;";
                row.onclick = () => {
                    currentSelectedColor = cat.hex;
                    buildRdvCategorySelector();
                };

                let left = document.createElement('div');
                left.style = "display:flex; align-items:center; gap:10px;";
                let dot = document.createElement('div');
                dot.style = `width:20px; height:20px; border-radius:50%; background-color:${cat.hex}; border:1px solid #ccc;`;
                let txt = document.createElement('span');
                txt.innerText = cat.name;
                
                left.appendChild(dot); left.appendChild(txt);
                row.appendChild(left);

                if(currentSelectedColor === cat.hex) {
                    row.innerHTML += `<i class="fa-solid fa-checkmark" style="color:#007AFF; font-weight:bold;"></i>`;
                }
                container.appendChild(row);
            });
        }

        function editRdv(id) {
            const rdv = appointments.find(r => r.id === id);
            if(!rdv) return;

            document.getElementById('modalTitle').innerText = "Modifier RDV";
            document.getElementById('rdvId').value = rdv.id;
            document.getElementById('rdvDateStr').value = rdv.dateStr;
            document.getElementById('rdvTitleInput').value = rdv.title;
            document.getElementById('rdvHour').value = rdv.hour;
            document.getElementById('rdvMinute').value = rdv.minute;
            document.getElementById('rdvLocation').value = rdv.location || '';
            document.getElementById('rdvNotes').value = rdv.notes || '';
            
            currentSelectedIcon = rdv.icon || "fa-calendar-days";
            document.querySelectorAll('.icon-opt').forEach(el => el.classList.remove('selected'));
            let targetIcoNode = document.getElementById(`ico-${currentSelectedIcon}`);
            if(targetIcoNode) targetIcoNode.classList.add('selected');

            currentSelectedColor = rdv.color;
            buildRdvCategorySelector();

            document.getElementById('btnDeleteRdv').style.display = 'block';
            document.getElementById('rdvModal').style.display = 'flex';
        }

        function saveRdv() {
            const title = document.getElementById('rdvTitleInput').value;
            if(!title) return alert("Le titre est obligatoire");

            const id = document.getElementById('rdvId').value;
            const dateStr = document.getElementById('rdvDateStr').value;
            const hour = parseInt(document.getElementById('rdvHour').value);
            const minute = parseInt(document.getElementById('rdvMinute').value);
            const location = document.getElementById('rdvLocation').value;
            const notes = document.getElementById('rdvNotes').value;

            if(id) {
                let rdv = appointments.find(r => r.id === id);
                rdv.title = title; rdv.hour = hour; rdv.minute = minute;
                rdv.location = location; rdv.notes = notes; rdv.color = currentSelectedColor; rdv.icon = currentSelectedIcon;
            } else {
                appointments.push({
                    id: Date.now().toString(),
                    dateStr, title, hour, minute, location, notes, color: currentSelectedColor, icon: currentSelectedIcon
                });
            }

            localStorage.setItem('web_appointments', JSON.stringify(appointments));
            closeModal('rdvModal');
            renderCalendar();
        }

        function deleteRdv() {
            const id = document.getElementById('rdvId').value;
            appointments = appointments.filter(r => r.id !== id);
            localStorage.setItem('web_appointments', JSON.stringify(appointments));
            closeModal('rdvModal');
            renderCalendar();
        }

        // FENÊTRE CONFIGURATION GÉNÉRALE
        function openSettings() {
            buildSettingsCategoriesList();
            buildNewCatColorPicker();
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function buildSettingsCategoriesList() {
            const container = document.getElementById('settingsCategoriesContainer');
            container.innerHTML = '';
            customCategories.forEach((cat, index) => {
                let div = document.createElement('div');
                div.className = 'category-list-item';
                
                let dot = document.createElement('div');
                dot.style = `width:24px; height:24px; border-radius:50%; background-color:${cat.hex}; border:1px solid #ccc; flex-shrink:0;`;
                
                let input = document.createElement('input');
                input.type = 'text';
                input.value = cat.name;
                input.onchange = (e) => {
                    customCategories[index].name = e.target.value;
                    localStorage.setItem('web_custom_categories', JSON.stringify(customCategories));
                };

                let btnDel = document.createElement('button');
                btnDel.className = 'btn btn-danger';
                btnDel.style = 'padding: 5px 10px; font-size:12px;';
                btnDel.innerHTML = '<i class="fa-solid fa-trash"></i>';
                btnDel.onclick = () => {
                    customCategories.splice(index, 1);
                    localStorage.setItem('web_custom_categories', JSON.stringify(customCategories));
                    buildSettingsCategoriesList();
                };

                div.appendChild(dot); div.appendChild(input); div.appendChild(btnDel);
                container.appendChild(div);
            });
        }

        function buildNewCatColorPicker() {
            const container = document.getElementById('newCatColorPicker');
            container.innerHTML = '';
            colorPalette.forEach(hex => {
                let dot = document.createElement('div');
                dot.className = 'color-dot-opt' + (hex === newCatSelectedHex ? ' selected' : '');
                dot.style.backgroundColor = hex;
                if(hex === '#FFFFFF') dot.style.border = '1px solid #ccc';
                dot.onclick = () => {
                    newCatSelectedHex = hex;
                    buildNewCatColorPicker();
                };
                container.appendChild(dot);
            });
        }

        function addNewCategory() {
            const nameInput = document.getElementById('newCatName');
            if(!nameInput.value) return alert("Indiquez un nom de catégorie");
            
            customCategories.push({
                id: Date.now().toString(),
                name: nameInput.value,
                hex: newCatSelectedHex
            });
            localStorage.setItem('web_custom_categories', JSON.stringify(customCategories));
            nameInput.value = '';
            buildSettingsCategoriesList();
        }

        function saveInterfaceSettings() {
            uiSettings.textHex = document.getElementById('setHexText').value;
            uiSettings.gridHex = document.getElementById('setHexGrid').value;
            uiSettings.bgHex = document.getElementById('setHexBg').value;
            uiSettings.weekendBgHex = document.getElementById('setHexWeekend').value;
            uiSettings.holidayBgHex = document.getElementById('setHexHoliday').value;
            
            localStorage.setItem('web_ui_settings', JSON.stringify(uiSettings));
            applyUiSettings();
            renderCalendar();
        }

        function clearAllData() {
            if(confirm("Attention : cela va détruire la totalité de vos données et réglages. Continuer ?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // FERMETURE MODALES
        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

        // GESTION DE LA LISTE DÉROULANTE
        function toggleDropdown() {
            const drop = document.getElementById('allRdvDropdown');
            if(drop.style.display === 'block') { drop.style.display = 'none'; return; }

            drop.innerHTML = '';
            let sorted = [...appointments].sort((a,b) => {
                if(a.dateStr !== b.dateStr) return a.dateStr.localeCompare(b.dateStr);
                return a.hour - b.hour;
            });

            if(sorted.length === 0) {
                drop.innerHTML = `<button disabled>Aucun rendez-vous enregistré</button>`;
            } else {
                sorted.forEach(rdv => {
                    let d = rdv.dateStr.split('-');
                    let dateFormatted = `${d[2]}/${d[1]}/${d[0]}`;
                    let btn = document.createElement('button');
                    btn.innerHTML = `<i class="fa-solid ${rdv.icon || 'fa-calendar-days'}" style="color:${rdv.color}"></i> <b>${dateFormatted} à ${String(rdv.hour).padStart(2,'0')}h${String(rdv.minute).padStart(2,'0')}</b> : ${rdv.title}`;
                    btn.onclick = () => { drop.style.display = 'none'; editRdv(rdv.id); };
                    drop.appendChild(btn);
                });
            }
            drop.style.display = 'block';
        }

        // LUMINANCE / LISIBILITÉ DU TEXTE
        function getAccessibleTextColor(hex) {
            let c = hex.substring(1);
            let rgb = parseInt(c, 16);
            let r = (rgb >> 16) & 0xff;
            let g = (rgb >> 8) & 0xff;
            let b = (rgb >> 0) & 0xff;
            let luma = 0.299 * r + 0.587 * g + 0.114 * b;
            return luma < 120 ? '#ffffff' : '#000000';
        }

        window.onclick = function(event) {
            if (!event.target.matches('.btn') && !event.target.closest('.dropdown')) {
                document.getElementById('allRdvDropdown').style.display = 'none';
            }
            if (event.target.className === 'modal') { event.target.style.display = 'none'; }
        }

        window.onload = init;
    </script>
</body>
</html>
